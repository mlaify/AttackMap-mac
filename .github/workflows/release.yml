name: Release

# Builds, signs (Developer ID), notarizes, staples, and publishes a DMG when a
# vX.Y.Z tag is pushed. All credentials come from repo secrets — see
# docs/RELEASE.md for the one-time setup and the exact secret names.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (defaults to the tag / project.yml)"
        required: false

permissions:
  contents: write   # create the GitHub Release + upload the DMG

jobs:
  release:
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode & log toolchain
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_DEV_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write notarization API key
        env:
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8 }}
        run: echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary_key.p8"

      - name: Build, sign, notarize, staple
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.version }}"
          [ -n "$VERSION" ] || VERSION="${GITHUB_REF_NAME#v}"
          NOTARY_KEY="$RUNNER_TEMP/notary_key.p8" scripts/package.sh "$VERSION"

      - name: Clean up secrets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/notary_key.p8" "$RUNNER_TEMP/cert.p12"
          security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true

      - name: Publish DMG to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" dist/*.dmg \
            --title "AttackMap.app $GITHUB_REF_NAME" \
            --notes "Signed + notarized macOS build. See CHANGELOG." \
          || gh release upload "$GITHUB_REF_NAME" dist/*.dmg --clobber

      - name: Upload DMG artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AttackMap-dmg
          path: dist/*.dmg
          if-no-files-found: warn
